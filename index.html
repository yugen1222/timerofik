<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Таймер номерков</title>

<style>
body{
  margin:0;
  padding:18px;
  background:#111827;
  font-family:Arial,sans-serif;
  color:white;
}

h1{text-align:center;margin:10px 0 18px;}

.panel{
  background:#1f2937;
  padding:16px;
  border-radius:18px;
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
  margin-bottom:18px;
}

input{
  padding:14px;
  font-size:24px;
  width:180px;
  text-align:center;
  border:none;
  border-radius:12px;
}

button{
  padding:12px 16px;
  font-size:18px;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

.add-btn{background:#2563eb;color:white;}
.sound-btn{background:#9333ea;color:white;}

.section-title{
  font-size:28px;
  font-weight:bold;
  margin:22px 0 12px;
  text-align:center;
}

.orders{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:15px;
}

.card{
  padding:20px;
  border-radius:22px;
  text-align:center;
  background:#374151;
}

.free{background:#374151;}
.green{background:#16a34a;}
.yellow{background:#f59e0b;}
.red{background:#dc2626;animation:blink 1s infinite;}
.pause{background:#2563eb;}

@keyframes blink{
  50%{opacity:0.75;}
}

.number{
  font-size:46px;
  font-weight:bold;
}

.time{
  font-size:52px;
  margin:12px 0;
  font-weight:bold;
}

.status{
  font-size:28px;
  font-weight:bold;
}

.btn-row{
  display:flex;
  gap:8px;
  margin-top:10px;
}

.reset-btn,
.pause-btn,
.delete-btn{
  background:#111827;
  color:white;
  width:100%;
  margin-top:8px;
}

.pause-btn{background:#1e3a8a;}
.reset-btn{background:#111827;}
.delete-btn{background:#4b5563;}

.free-card{
  cursor:pointer;
}
</style>
</head>

<body>

<h1>Таймер номерков</h1>

<div class="panel">
  <input type="number" id="numberInput" placeholder="Номерок">

  <button class="add-btn" onclick="addNumber()">
    Добавить номерок
  </button>

  <button class="sound-btn" onclick="enableSound()">
    🔊 Включить звук
  </button>
</div>

<div class="section-title">Активные заказы</div>
<div class="orders" id="activeOrders"></div>

<div class="section-title">Свободные номерки</div>
<div class="orders" id="freeNumbers"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDt1NFn_A3ryqgkgcTLOrKphOaWZnRFGEE",
  authDomain: "timerofik.firebaseapp.com",
  databaseURL: "https://timerofik-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "timerofik",
  storageBucket: "timerofik.firebasestorage.app",
  messagingSenderId: "599914248706",
  appId: "1:599914248706:web:b40c402d24e4de7331051b",
  measurementId: "G-F1H5SHKNHC"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const READY_SOUND = "Заказ готов.mp3";
const TAKE_SOUND = "Нужно забрать.mp3";

let soundEnabled = false;
let numbersData = {};
let audioSession = 0;
let yellowPlayed = {};
let redPlayed = {};
let redRepeatTimers = {};

function enableSound(){
  soundEnabled = true;

  const audio = new Audio(READY_SOUND);
  audio.volume = 0.01;

  audio.play()
    .then(() => {
      audio.pause();
      audio.currentTime = 0;
      alert("Звук включен");
    })
    .catch(() => {
      alert("Проверьте MP3-файлы и нажмите ещё раз");
    });
}

function playAudioManyTimes(fileName, count, number){
  if(!soundEnabled) return;

  const thisSession = audioSession;
  let played = 0;

  function playNext(){
    const data = numbersData[number];

    if(played >= count) return;
    if(thisSession !== audioSession) return;
    if(!data || data.active !== true || data.paused === true) return;

    const audio = new Audio(fileName);
    audio.volume = 1;

    audio.play().catch(err => console.log("Ошибка звука:", err));

    audio.onended = () => {
      played++;
      playNext();
    };
  }

  playNext();
}

function getElapsedSeconds(data){
  if(!data || data.active !== true) return 0;

  const before = data.elapsedBeforePause || 0;

  if(data.paused === true){
    return before;
  }

  if(!data.startTime) return before;

  return before + Math.floor((Date.now() - data.startTime) / 1000);
}

function formatTime(seconds){
  const min = Math.floor(seconds / 60);
  const sec = seconds % 60;

  return String(min).padStart(2,"0") + ":" + String(sec).padStart(2,"0");
}

function getStatus(data){
  if(data.paused === true){
    return {
      className:"card pause",
      text:"ПАУЗА"
    };
  }

  const seconds = getElapsedSeconds(data);

  if(seconds < 180){
    return {
      className:"card green",
      text:"НОРМА"
    };
  }

  if(seconds < 300){
    return {
      className:"card yellow",
      text:"ПОЗДНО"
    };
  }

  return {
    className:"card red",
    text:"ДОЛГО"
  };
}

function renderNumbers(){
  const activeBox = document.getElementById("activeOrders");
  const freeBox = document.getElementById("freeNumbers");

  activeBox.innerHTML = "";
  freeBox.innerHTML = "";

  const numbers = Object.keys(numbersData).sort((a,b) => Number(a) - Number(b));

  numbers.forEach(number => {
    const data = numbersData[number];

    if(data.active === true){
      createActiveCard(number, data);
    } else {
      createFreeCard(number);
    }
  });
}

function createActiveCard(number, data){
  const activeBox = document.getElementById("activeOrders");

  const seconds = getElapsedSeconds(data);
  const status = getStatus(data);

  const card = document.createElement("div");
  card.className = status.className;
  card.dataset.number = number;

  const pauseText = data.paused === true ? "▶ Продолжить" : "⏸ Стоп";

  card.innerHTML = `
    <div class="number">№ ${number}</div>
    <div class="time">${formatTime(seconds)}</div>
    <div class="status">${status.text}</div>

    <button class="pause-btn">${pauseText}</button>
    <button class="reset-btn">Сбросить</button>
  `;

  activeBox.appendChild(card);

  card.querySelector(".pause-btn").onclick = function(){
    togglePause(number);
  };

  card.querySelector(".reset-btn").onclick = function(){
    resetNumber(number);
  };
}

function createFreeCard(number){
  const freeBox = document.getElementById("freeNumbers");

  const card = document.createElement("div");
  card.className = "card free free-card";
  card.dataset.number = number;

  card.innerHTML = `
    <div class="number">№ ${number}</div>
    <div class="time">00:00</div>
    <div class="status">СВОБОДЕН</div>

    <button class="delete-btn">Удалить номерок</button>
  `;

  freeBox.appendChild(card);

  card.onclick = function(event){
    if(event.target.tagName === "BUTTON") return;
    startNumber(number);
  };

  card.querySelector(".delete-btn").onclick = function(){
    if(confirm("Удалить номерок №" + number + "?")){
      db.ref("numbers/" + number).remove();
    }
  };
}

function updateTimers(){
  const activeCards = document.querySelectorAll("#activeOrders .card");

  activeCards.forEach(card => {
    const number = card.dataset.number;
    const data = numbersData[number];

    if(!data || data.active !== true) return;

    const seconds = getElapsedSeconds(data);
    const status = getStatus(data);

    card.className = status.className;
    card.querySelector(".time").textContent = formatTime(seconds);
    card.querySelector(".status").textContent = status.text;

    const pauseBtn = card.querySelector(".pause-btn");
    pauseBtn.textContent = data.paused === true ? "▶ Продолжить" : "⏸ Стоп";

    if(data.paused === true) return;

    if(seconds >= 180 && seconds < 300 && !yellowPlayed[number]){
      yellowPlayed[number] = true;
      playAudioManyTimes(READY_SOUND, 3, number);
    }

    if(seconds >= 300 && !redPlayed[number]){
      redPlayed[number] = true;
      playAudioManyTimes(TAKE_SOUND, 5, number);

      if(!redRepeatTimers[number]){
        redRepeatTimers[number] = setInterval(() => {
          const freshData = numbersData[number];

          if(freshData && freshData.active === true && freshData.paused !== true){
            playAudioManyTimes(TAKE_SOUND, 5, number);
          } else {
            clearInterval(redRepeatTimers[number]);
            delete redRepeatTimers[number];
          }
        }, 10000);
      }
    }
  });
}

function startNumber(number){
  audioSession++;

  yellowPlayed[number] = false;
  redPlayed[number] = false;

  if(redRepeatTimers[number]){
    clearInterval(redRepeatTimers[number]);
    delete redRepeatTimers[number];
  }

  db.ref("numbers/" + number).update({
    active: true,
    paused: false,
    startTime: Date.now(),
    elapsedBeforePause: 0
  });
}

function togglePause(number){
  const data = numbersData[number];

  if(!data || data.active !== true) return;

  audioSession++;

  if(data.paused === true){
    db.ref("numbers/" + number).update({
      paused: false,
      startTime: Date.now()
    });
  } else {
    const seconds = getElapsedSeconds(data);

    if(redRepeatTimers[number]){
      clearInterval(redRepeatTimers[number]);
      delete redRepeatTimers[number];
    }

    db.ref("numbers/" + number).update({
      paused: true,
      startTime: null,
      elapsedBeforePause: seconds
    });
  }
}

function resetNumber(number){
  audioSession++;

  yellowPlayed[number] = false;
  redPlayed[number] = false;

  if(redRepeatTimers[number]){
    clearInterval(redRepeatTimers[number]);
    delete redRepeatTimers[number];
  }

  db.ref("numbers/" + number).update({
    active: false,
    paused: false,
    startTime: null,
    elapsedBeforePause: 0
  });
}

function addNumber(){
  const input = document.getElementById("numberInput");
  const number = input.value.trim();

  if(number === ""){
    alert("Введите номерок");
    return;
  }

  db.ref("numbers/" + number).set({
    active: false,
    paused: false,
    startTime: null,
    elapsedBeforePause: 0
  });

  input.value = "";
  input.focus();
}

document.getElementById("numberInput").addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    addNumber();
  }
});

db.ref("numbers").on("value", snapshot => {
  numbersData = snapshot.val() || {};

  Object.keys(redRepeatTimers).forEach(number => {
    const data = numbersData[number];

    if(!data || data.active !== true || data.paused === true){
      clearInterval(redRepeatTimers[number]);
      delete redRepeatTimers[number];
    }
  });

  renderNumbers();
});

setInterval(updateTimers, 1000);
</script>

</body>
</html>
